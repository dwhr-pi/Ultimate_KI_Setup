services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE}
      OLLAMA_ORIGINS: ${OLLAMA_ORIGINS}
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  openclaw:
    image: ${OPENCLAW_IMAGE}
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOWED_ORIGIN: ${OPENCLAW_ALLOWED_ORIGIN}
      OPENCLAW_PRIMARY_MODEL: ${OPENCLAW_PRIMARY_MODEL}
      OPENCLAW_FALLBACK_MODEL: ${OPENCLAW_FALLBACK_MODEL}
      OPENCLAW_AGENT_TIMEZONE: ${OPENCLAW_AGENT_TIMEZONE}
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      openclaw:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "${PROXY_HTTP_PORT}:80"
      - "${PROXY_HTTPS_PORT}:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  backend:
    driver: bridge
